name: CI

on:
  # Validate protected branches post-merge, and every PR (incl. forks/feature
  # branches) via pull_request. Limiting push to `main` avoids a redundant
  # second run on each feature-branch push that a PR already covers.
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    name: Build & test (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build:server

      - name: Unit tests
        run: npm test

      - name: Smoke — webhook signature contract
        run: npm run smoke:signature

      - name: Smoke — webhook pipeline
        run: npm run smoke:webhooks

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Advisory on day one: lint must not gate merges yet, but its findings
      # should be visible — not buried in raw logs. So we keep the job green
      # (continue-on-error) and publish the full ESLint output to the job's
      # Step Summary, with a clear pass/fail banner. Remove continue-on-error
      # to start enforcing once the existing findings are burned down.
      - name: ESLint
        id: eslint
        shell: bash
        # Explicit pipefail so the step outcome reflects ESLint's exit code,
        # not tee's — keeping the pass/⚠️ banner below truthful. (GitHub's
        # default bash already sets pipefail, but stating it makes the
        # correctness of `steps.eslint.outcome` independent of that default.)
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log
        continue-on-error: true

      - name: Publish lint results to job summary
        if: always()
        run: |
          {
            echo "### ESLint — advisory (does not gate merges yet)"
            echo ""
            if [ "${{ steps.eslint.outcome }}" = "failure" ]; then
              echo "⚠️ **ESLint reported errors.** Not blocking this merge, but please review."
            else
              echo "✅ **ESLint passed** (any warnings are listed below for burn-down)."
            fi
            echo ""
            echo '```'
            cat lint.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
