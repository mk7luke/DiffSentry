name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    name: Build & test (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build:server

      - name: Unit tests
        run: npm test

      - name: Smoke — webhook signature contract
        run: npm run smoke:signature

      - name: Smoke — webhook pipeline
        run: npm run smoke:webhooks

  lint:
    name: Lint (non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Non-blocking on day one: step-level continue-on-error surfaces findings
      # in the log and keeps the job green (a true non-blocking check), without
      # gating merges. Remove this once the existing findings are burned down.
      - name: ESLint
        run: npm run lint
        continue-on-error: true
