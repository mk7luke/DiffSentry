services:
  diffsentry:
    build: .
    ports:
      - "${PORT:-3005}:3005"
    env_file:
      - .env
    volumes:
      - ./private-key.pem:/app/private-key.pem:ro
      - diffsentry-data:/app/data
    restart: unless-stopped

  demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    ports:
      - "3027:80"
    restart: unless-stopped
    container_name: diffsentry-demo

volumes:
  diffsentry-data:
